<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava Multi-Track Analyzer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #map { height: 400px; width: 100%; border-bottom: 2px solid #ccc; }
        
        .dashboard-controls { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .track-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .track-item { padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; font-size: 12px; }
        
        .chart-container { flex: 1; padding: 20px; overflow-y: auto; }
        canvas { max-height: 250px; margin-bottom: 30px; }
        
        .playback-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        #globalTimeSlider { flex: 1; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="dashboard-controls">
        <div class="playback-bar">
            <button id="playBtn">Play</button>
            <input type="range" id="globalTimeSlider" min="0" max="0" value="0">
            <span id="timeDisplay">00:00</span>
        </div>
        
        <div class="track-list" id="trackList">
            </div>
    </div>

    <div class="chart-container">
        <canvas id="hrChart"></canvas>
        <canvas id="speedChart"></canvas>
    </div>

    <script>
        // Global state management
        let tracks = [];
        let isPlaying = false;
        let globalTime = 0;
        let maxDuration = 0;
        let animationFrame;

        // Initialize Leaflet map
        const map = L.map('map').setView([47.26, 11.40], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Initialize Chart.js instances
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: { x: { type: 'linear', title: { display: true, text: 'Time (seconds)' } } }
        };

        const hrChart = new Chart(document.getElementById('hrChart'), {
            type: 'line',
            data: { datasets: [] },
            options: { ...chartOptions, plugins: { title: { display: true, text: 'Heart Rate (bpm)' } } }
        });

        const speedChart = new Chart(document.getElementById('speedChart'), {
            type: 'line',
            data: { datasets: [] },
            options: { ...chartOptions, plugins: { title: { display: true, text: 'Speed (m/s)' } } }
        });

        // Function to interpolate between two data points
        function getInterpolatedValue(stream, type, time) {
            const times = stream.time.data;
            const values = stream[type].data;

            for (let i = 0; i < times.length - 1; i++) {
                if (time >= times[i] && time <= times[i+1]) {
                    const ratio = (time - times[i]) / (times[i+1] - times[i]);
                    
                    if (type === 'latlng') {
                        const lat = values[i][0] + ratio * (values[i+1][0] - values[i][0]);
                        const lng = values[i][1] + ratio * (values[i+1][1] - values[i][1]);
                        return [lat, lng];
                    }
                    return values[i] + ratio * (values[i+1] - values[i]);
                }
            }
            return null;
        }

        // Update all markers and chart indicators
        function updateUI() {
            tracks.forEach(track => {
                const adjustedTime = globalTime + track.offset;
                const pos = getInterpolatedValue(track.stream, 'latlng', adjustedTime);
                
                if (pos) {
                    track.marker.setLatLng(pos);
                }
            });

            document.getElementById('globalTimeSlider').value = globalTime;
            document.getElementById('timeDisplay').innerText = new Date(globalTime * 1000).toISOString().substr(14, 5);
        }

        // Playback loop
        function playLoop() {
            if (!isPlaying) return;
            
            globalTime += 0.5; // Half second steps
            if (globalTime > maxDuration) globalTime = 0;
            
            updateUI();
            setTimeout(() => requestAnimationFrame(playLoop), 500);
        }

        document.getElementById('playBtn').onclick = () => {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').innerText = isPlaying ? 'Pause' : 'Play';
            if (isPlaying) playLoop();
        };

        document.getElementById('globalTimeSlider').oninput = (e) => {
            globalTime = parseFloat(e.target.value);
            updateUI();
        };

        // Example function to add a track (to be called after fetching Strava data)
        function addTrackToUI(activityId, stream, color) {
            const trackDuration = Math.max(...stream.time.data);
            if (trackDuration > maxDuration) {
                maxDuration = trackDuration;
                document.getElementById('globalTimeSlider').max = maxDuration;
            }

            const marker = L.circleMarker([0,0], { color: color, radius: 6, fillOpacity: 1 }).addTo(map);
            const polyline = L.polyline(stream.latlng.data, { color: color, weight: 3, opacity: 0.5 }).addTo(map);
            
            const trackObj = {
                id: activityId,
                stream: stream,
                color: color,
                offset: 0,
                marker: marker
            };

            tracks.push(trackObj);
            map.fitBounds(polyline.getBounds());

            // Add offset slider to UI
            const list = document.getElementById('trackList');
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <strong style="color:${color}">Track ${activityId}</strong><br>
                Offset: <input type="number" value="0" style="width:50px" 
                        onchange="updateTrackOffset('${activityId}', this.value)"> sec
            `;
            list.appendChild(div);

            // Update charts
            updateChartData();
        }

        function updateTrackOffset(id, value) {
            const track = tracks.find(t => t.id === id);
            if (track) track.offset = parseFloat(value);
            updateUI();
        }

        function updateChartData() {
            hrChart.data.datasets = tracks.map(t => ({
                label: 'HR ' + t.id,
                data: t.stream.time.data.map((time, i) => ({ x: time, y: t.stream.heartrate.data[i] })),
                borderColor: t.color,
                borderWidth: 1,
                pointRadius: 0
            }));
            hrChart.update();

            speedChart.data.datasets = tracks.map(t => ({
                label: 'Speed ' + t.id,
                data: t.stream.time.data.map((time, i) => ({ x: time, y: t.stream.velocity_smooth.data[i] })),
                borderColor: t.color,
                borderWidth: 1,
                pointRadius: 0
            }));
            speedChart.update();
        }
    </script>
</body>
</html>
